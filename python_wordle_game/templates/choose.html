<!DOCTYPE html>
<html>
<head>
    <title>Choose Word Length</title>
    <style>
        body {
            background: linear-gradient(45deg, #6a11cb, #2575fc);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }
        h2 {
            font-size: 36px;
            margin-top: 20%;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        button {
            background: #ff6f61;
            color: white;
            padding: 15px 30px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }
        button:hover {
            background: #d9534f;
        }
        .flash-messages {
            color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Choose the length of the word:</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form method="post">
        <div class="button-container">
            <button type="submit" name="word_length" value="4">4</button>
            <button type="submit" name="word_length" value="5">5</button>
            <button type="submit" name="word_length" value="6">6</button>
        </div>
    </form>
</body>
</html>
