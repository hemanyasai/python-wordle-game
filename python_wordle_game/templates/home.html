<!DOCTYPE html>
<html>
<head>
    <title>Wordle Game - Home</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 50px;
            color: white;
            margin-top: 20%;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }
        button {
            background: #ff6f61;
            color: white;
            padding: 15px 30px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }
        button:hover {
            background: #d9534f;
        }
    </style>
</head>
<body>
    <h1>Welcome to Wordle Game!</h1>
    <div class="button-container">
        <form action="{{ url_for('choose_length') }}" method="get">
            <button type="submit">Start</button>
        </form>
        <form>
            <button type="button" onclick="window.close()">Quit</button>
        </form>
    </div>
</body>
</html>
