<!DOCTYPE html>
<html>
<head>
    <title>Wordle Game</title>
    <style>
        body {
            background: aquamarine;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }
        h2 {
            font-size: 36px;
            color: black;
            margin-bottom: 20px;
        }
        .board {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .cell {
            width: 50px;
            height: 50px;
            margin: 5px;
            font-size: 24px;
            line-height: 50px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }
        .green { background: #28a745; }
        .yellow { background: #ffc107; }
        .grey { background: #6c757d; }
        input[type="text"] {
            padding: 10px;
            font-size: 18px;
            width: 200px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background: #ff6f61;
            color: white;
            padding: 10px 20px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            margin: 5px;
        }
        button:hover {
            background: #d9534f;
        }
        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Guess the Word</h2>
        <div class="board">
            {% for attempt in attempts %}
                <div class="row">
                    {% for i in range(word_length) %}
                        <div class="cell {{ attempt.feedback[i] }}">
                            {{ attempt.guess[i] }}
                        </div>
                    {% endfor %}
                </div>
            {% endfor %}
        </div>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if attempts|length < word_length %}
            <div class="input-container">
                <form method="post">
                    <input type="text" name="guess" maxlength="{{ word_length }}" autofocus>
                    <div>
                        <button type="submit" name="action" value="submit">Submit</button>
                        <button type="submit" name="action" value="quit">Quit</button>
                    </div>
                </form>
            </div>
        {% endif %}
    </div>
</body>
</html>
